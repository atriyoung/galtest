<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        img.thumb { width: 60px; height: 40px; object-fit: cover; }
        .btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; margin-right: 5px; }
        .btn-primary { background: #3498db; } .btn-danger { background: #e74c3c; } .btn-success { background: #2ecc71; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 500px; border-radius: 8px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
        .nav { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <button class="btn btn-primary" onclick="showSec('list')">游戏列表</button>
        <button class="btn btn-success" onclick="showSec('add')">添加游戏</button>
        <button class="btn btn-danger" onclick="logout()" style="float:right">退出</button>
    </div>
    
    <div id="listSec">
        <h3>游戏列表</h3>
        <table><thead><tr><th>封面</th><th>标题</th><th>标签</th><th>操作</th></tr></thead><tbody id="gameTableBody"></tbody></table>
    </div>

    <div id="addSec" style="display:none">
        <h3>添加游戏</h3>
        <form id="addForm">
            <input type="text" id="addTitle" placeholder="标题" required>
            <input type="text" id="addImg" placeholder="图片URL (或留空使用默认)">
            <input type="text" id="addLink" placeholder="下载链接" required>
            <div style="margin-bottom:15px">
                标签: 
                <label><input type="checkbox" class="tag-cb" value="纯爱"> 纯爱</label>
                <label><input type="checkbox" class="tag-cb" value="校园"> 校园</label>
                <label><input type="checkbox" class="tag-cb" value="异世界"> 异世界</label>
                <label><input type="checkbox" class="tag-cb" value="治愈"> 治愈</label>
            </div>
            <button type="submit" class="btn btn-success">保存</button>
        </form>
    </div>
</div>

<!-- 编辑弹窗 -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>编辑游戏</h3>
        <form id="editForm">
            <input type="hidden" id="editId">
            <input type="text" id="editTitle" required>
            <input type="text" id="editImg" placeholder="新图片URL (留空不变)">
            <input type="text" id="editLink" required>
            <div style="margin-bottom:15px">
                标签: 
                <label><input type="checkbox" class="edit-tag-cb" value="纯爱"> 纯爱</label>
                <label><input type="checkbox" class="edit-tag-cb" value="校园"> 校园</label>
                <label><input type="checkbox" class="edit-tag-cb" value="异世界"> 异世界</label>
                <label><input type="checkbox" class="edit-tag-cb" value="治愈"> 治愈</label>
            </div>
            <button type="submit" class="btn btn-primary">更新</button>
            <button type="button" class="btn btn-danger" onclick="document.getElementById('editModal').style.display='none'">取消</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
<script>
if(!checkLogin()) window.location.href="login.html";
let allGames = [];

async function load() {
    allGames = await getGames();
    const tbody = document.getElementById('gameTableBody');
    tbody.innerHTML = '';
    allGames.forEach(g => {
        tbody.innerHTML += `
        <tr>
            <td><img src="${g.image||''}" class="thumb"></td>
            <td>${g.title}</td>
            <td>${(g.tags||[]).join(', ')}</td>
            <td>
                <button class="btn btn-primary" onclick="openEdit(${g.id})">编辑</button>
                <button class="btn btn-danger" onclick="del(${g.id})">删除</button>
            </td>
        </tr>`;
    });
}

function showSec(s) {
    document.getElementById('listSec').style.display = s==='list'?'block':'none';
    document.getElementById('addSec').style.display = s==='add'?'block':'none';
    if(s==='list') load();
}

document.getElementById('addForm').onsubmit = async (e) => {
    e.preventDefault();
    const tags = Array.from(document.querySelectorAll('.tag-cb:checked')).map(cb=>cb.value);
    await addGame({
        title: document.getElementById('addTitle').value,
        image: document.getElementById('addImg').value || 'https://via.placeholder.com/300',
        downloadUrl: document.getElementById('addLink').value,
        tags: tags
    });
    alert('添加成功');
    e.target.reset();
    showSec('list');
};

async function openEdit(id) {
    const g = allGames.find(x=>x.id==id);
    if(!g) return;
    document.getElementById('editId').value = g.id;
    document.getElementById('editTitle').value = g.title;
    document.getElementById('editImg').value = '';
    document.getElementById('editLink').value = g.downloadUrl;
    document.querySelectorAll('.edit-tag-cb').forEach(cb => cb.checked = g.tags && g.tags.includes(cb.value));
    document.getElementById('editModal').style.display = 'block';
}

document.getElementById('editForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const tags = Array.from(document.querySelectorAll('.edit-tag-cb:checked')).map(cb=>cb.value);
    const data = {
        title: document.getElementById('editTitle').value,
        downloadUrl: document.getElementById('editLink').value,
        tags: tags
    };
    const imgVal = document.getElementById('editImg').value;
    if(imgVal) data.image = imgVal;
    
    await updateGame(id, data);
    alert('更新成功');
    document.getElementById('editModal').style.display='none';
    showSec('list');
};

async function del(id) {
    if(confirm('确定删除？')) {
        await deleteGame(id);
        showSec('list');
    }
}
load();
</script>
</body>
</html>
