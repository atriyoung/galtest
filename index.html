<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♥ GALGAME 资源整合站 ♥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部样式 */
        header {
            text-align: center;
            padding: 40px 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2.5em;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* 分类按钮样式 */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: #ff6b9d;
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.4);
            border-color: #ff6b9d;
        }

        /* 游戏卡片网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 107, 157, 0.3);
        }

        .game-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #0f0f1a;
        }

        .game-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.2em;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 600;
            line-height: 1.4;
            min-height: 3.2em; /* 保证标题高度一致 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            flex-grow: 1;
        }

        .tag {
            padding: 4px 12px;
            background: rgba(255, 107, 157, 0.15);
            color: #ff8eab;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid rgba(255, 107, 157, 0.2);
        }

        .download-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ff6b9d, #ff8eab);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.2);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
            filter: brightness(1.1);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        /* 管理员入口链接 */
        .admin-link {
            position: fixed;
            bottom: 25px;
            right: 25px;
            padding: 12px 24px;
            background: rgba(255, 107, 157, 0.15);
            color: #ff6b9d;
            border: 1px solid #ff6b9d;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .admin-link:hover {
            background: #ff6b9d;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.4);
            transform: translateY(-2px);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 20px;
            }

            .container {
                padding: 15px;
            }

            .admin-link {
                bottom: 15px;
                right: 15px;
                padding: 10px 18px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .categories {
                gap: 10px;
            }
            
            .category-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
        
        /* 空状态提示 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>♥ GALGAME 资源整合站 ♥</h1>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索游戏名称..." id="searchInput" autocomplete="off">
            </div>
        </header>

        <div class="categories">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="纯爱">纯爱</button>
            <button class="category-btn" data-category="校园">校园</button>
            <button class="category-btn" data-category="异世界">异世界</button>
            <button class="category-btn" data-category="治愈">治愈</button>
            <button class="category-btn" data-category="异能">异能</button>
            <button class="category-btn" data-category="科幻">科幻</button>
            <button class="category-btn" data-category="悬疑">悬疑</button>
        </div>

        <div class="games-grid" id="gamesGrid">
            <!-- 游戏卡片将通过 JavaScript 动态生成 -->
            <div class="empty-state">正在加载游戏资源...</div>
        </div>
    </div>

    <a href="login.html" class="admin-link"> 管理员后台</a>

    <!-- 引入公共脚本 -->
    <script src="script.js"></script>
    
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            // 获取所有游戏数据 (从 script.js 的 getGames 函数)
            const games = getGames();
            let currentCategory = 'all';

            // 渲染游戏列表函数
            function renderGames(filteredGames) {
                const gamesGrid = document.getElementById('gamesGrid');
                gamesGrid.innerHTML = '';

                if (!filteredGames || filteredGames.length === 0) {
                    gamesGrid.innerHTML = `
                        <div class="empty-state">
                            <p>😢 没有找到相关游戏</p>
                            <p style="font-size: 14px; margin-top: 10px; opacity: 0.7;">试试其他关键词或分类吧~</p>
                        </div>
                    `;
                    return;
                }

                filteredGames.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    // 生成标签 HTML
                    const tagsHtml = game.tags && game.tags.length > 0 
                        ? game.tags.map(tag => `<span class="tag">${tag}</span>`).join('')
                        : '<span class="tag">无分类</span>';

                    // 处理图片加载失败的情况
                    const imageSrc = game.image || 'https://via.placeholder.com/300x200?text=No+Image';
                    const fallbackImage = 'https://via.placeholder.com/300x200?text=Image+Error';

                    card.innerHTML = `
                        <img src="${imageSrc}" alt="${game.title}" class="game-image" onerror="this.src='${fallbackImage}'">
                        <div class="game-info">
                            <h3 class="game-title" title="${game.title}">${game.title}</h3>
                            <div class="game-tags">${tagsHtml}</div>
                            <a href="${game.downloadUrl || '#'}" target="_blank" rel="noopener noreferrer" class="download-btn">
                                ${game.downloadUrl ? '前往下载' : '暂无链接'}
                            </a>
                        </div>
                    `;
                    
                    gamesGrid.appendChild(card);
                });
            }

            // 过滤游戏函数
            function filterGames() {
                const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
                
                let filtered = games;
                
                // 按分类过滤
                if (currentCategory !== 'all') {
                    filtered = filtered.filter(game => 
                        game.tags && game.tags.includes(currentCategory)
                    );
                }
                
                // 按搜索词过滤
                if (searchTerm) {
                    filtered = filtered.filter(game => 
                        game.title && game.title.toLowerCase().includes(searchTerm)
                    );
                }
                
                renderGames(filtered);
            }

            // 绑定分类按钮事件
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    // 移除所有激活状态
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    // 激活当前按钮
                    btn.classList.add('active');
                    // 更新当前分类
                    currentCategory = btn.dataset.category;
                    // 重新渲染
                    filterGames();
                });
            });

            // 绑定搜索输入事件
            document.getElementById('searchInput').addEventListener('input', filterGames);

            // 初始渲染
            renderGames(games);
        });
    </script>
</body>
</html>
