<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 次元游戏库 | GALGAME Resource</title>
    <!-- 引入圆润可爱的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff9a9e;
            --secondary: #fad0c4;
            --accent: #a18cd1;
            --text-dark: #4a4a4a;
            --text-light: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 0;
            /* 二次元梦幻渐变背景 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-image: linear-gradient(to top, #fad0c4 0%, #ffd1ff 100%);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* 顶部导航栏 - 毛玻璃效果 */
        .navbar {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ff9a9e, #a18cd1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.5);
            outline: none;
            font-family: inherit;
            color: var(--text-dark);
        }

        .search-input:focus {
            background: rgba(255,255,255,0.9);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 154, 158, 0.4);
        }

        /* 分类标签区 */
        .categories {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 30px 20px;
        }

        .tag-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-dark);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 0.9rem;
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.9);
        }

        .tag-btn.active {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            transform: scale(1.05);
        }

        /* 游戏卡片网格 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            backdrop-filter: blur(5px);
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(161, 140, 209, 0.3);
        }

        .card-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-info {
            padding: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .mini-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            background: rgba(161, 140, 209, 0.15);
            color: var(--accent);
            border-radius: 12px;
            font-weight: 600;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #a18cd1, #fbc2eb);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.3);
        }

        .download-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(161, 140, 209, 0.5);
            transform: scale(1.02);
        }

        /* 空状态提示 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: rgba(0,0,0,0.5);
            font-size: 1.2rem;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .navbar { flex-direction: column; gap: 15px; padding: 15px; }
            .search-container { width: 100%; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar">
    <div class="logo">🌸 次元游戏库</div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="搜索心仪的 Galgame...">
    </div>
</nav>

<!-- 分类筛选 -->
<div class="categories" id="categoryContainer">
    <button class="tag-btn active" data-category="all">✨ 全部</button>
    <button class="tag-btn" data-category="纯爱">💖 纯爱</button>
    <button class="tag-btn" data-category="校园">🏫 校园</button>
    <button class="tag-btn" data-category="异世界">🌍 异世界</button>
    <button class="tag-btn" data-category="治愈">☀️ 治愈</button>
    <button class="tag-btn" data-category="悬疑">🔍 悬疑</button>
</div>

<!-- 内容区域 -->
<div class="container">
    <div class="grid" id="gamesGrid">
        <!-- 卡片将通过 JS 动态插入 -->
        <div class="empty-state">正在加载次元数据... 🌌</div>
    </div>
</div>

<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const games = await getGames();
    let currentCategory = 'all';

    function render(list) {
        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = '';
        
        if (!list.length) {
            grid.innerHTML = '<div class="empty-state">没有找到相关的游戏哦 (´• ω •`) </div>';
            return;
        }

        list.forEach(g => {
            const tagsHtml = (g.tags || []).map(t => 
                `<span class="mini-tag">${t}</span>`
            ).join('');
            
            // 默认图片占位符 (使用二次元风格占位图)
            const defaultImg = 'https://via.placeholder.com/300x200/ffb7b2/ffffff?text=No+Image';

            grid.innerHTML += `
            <div class="card">
                <div class="card-img-wrapper">
                    <img src="${g.image || defaultImg}" onerror="this.src='${defaultImg}'" alt="${g.title}">
                </div>
                <div class="card-info">
                    <div class="card-title" title="${g.title}">${g.title}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    <a href="${g.downloadUrl || '#'}" target="_blank" class="download-btn">
                        ⬇️ 立即下载
                    </a>
                </div>
            </div>`;
        });
    }

    function filter() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        let res = games;
        
        if (currentCategory !== 'all') {
            res = res.filter(g => g.tags && g.tags.includes(currentCategory));
        }
        
        if (kw) {
            res = res.filter(g => g.title.toLowerCase().includes(kw));
        }
        
        render(res);
    }

    // 绑定分类点击事件
    document.querySelectorAll('.tag-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            filter();
        };
    });

    // 绑定搜索事件
    document.getElementById('searchInput').oninput = filter;

    // 初始渲染
    render(games);
});
</script>

</body>
</html>
