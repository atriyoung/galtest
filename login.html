<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 次元游戏库</title>
    <!-- 引入和 index.html 一致的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff9a9e;
            --accent: #a18cd1;
        }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            /* 与首页一致的渐变背景 */
            background-image: linear-gradient(to top, #fad0c4 0%, #ffd1ff 100%);
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif; 
        }
        .login-box { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
        }
        h2 {
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        input { 
            width: 100%; 
            padding: 12px 15px; 
            margin: 10px 0; 
            box-sizing: border-box; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            background: rgba(255,255,255,0.8);
        }
        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 8px rgba(255, 154, 158, 0.3);
        }
        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 15px;
            background: linear-gradient(to right, #ff9a9e, #fad0c4); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-msg { 
            color: #ff6b6b; 
            font-size: 0.9rem; 
            margin-top: 15px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error-msg.show {
            opacity: 1;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔐 管理员登录</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="用户名 (admin)" required autocomplete="off">
        <input type="password" id="password" placeholder="密码 (123456)" required>
        
        <button type="submit" id="submitBtn">登 录</button>
        
        <div id="errorMsg" class="error-msg">账号或密码错误，请重试</div>
    </form>
    
    <a href="index.html" class="back-link">← 返回首页</a>
</div>

<script src="script.js"></script>
<script>
    // 如果已经登录，直接跳转到后台
    if (checkLogin()) {
        window.location.href = "admin.html";
    }

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // 阻止表单默认提交刷新页面
        
        // 1. 获取输入
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();

        // 2. 界面状态：加载中
        submitBtn.disabled = true;
        submitBtn.textContent = "验证中...";
        errorMsg.classList.remove('show');

        try {
            // 3. 调用登录函数
            const success = await login(u, p);

            if (success) {
                // 4. 成功：跳转
                submitBtn.textContent = "登录成功!";
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 500);
            } else {
                // 5. 失败：显示错误
                errorMsg.textContent = "账号或密码错误 (默认: admin / 123456)";
                errorMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = "登 录";
                
                // 晃动动画提示错误
                document.querySelector('.login-box').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        } catch (err) {
            console.error(err);
            errorMsg.textContent = "网络错误，请稍后重试";
            errorMsg.classList.add('show');
            submitBtn.disabled = false;
            submitBtn.textContent = "登 录";
        }
    });
</script>

</body>
</html>
