<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - GALGAME 后台</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #fff;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 {
            text-align: center;
            color: #3498db;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #bdc3c7;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box; 
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .error-msg {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 管理员登录</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" required placeholder="请输入账号 (默认: admin)">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入密码 (默认: 123456)">
            </div>
            <button type="submit">登录</button>
            <div class="error-msg" id="errorMsg">账号或密码错误</div>
        </form>
        <a href="index.html" class="back-link">← 返回前台首页</a>
    </div>

    <script src="script.js"></script>
    <script>
        // 如果已经登录，直接跳转
        if (checkLogin()) {
            window.location.href = "admin.html";
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (login(user, pass)) {
                window.location.href = "admin.html";
            } else {
                errorMsg.style.display = 'block';
                // 晃动效果
                const box = document.querySelector('.login-box');
                box.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });
    </script>
</body>
</html>
